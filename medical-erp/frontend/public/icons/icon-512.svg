<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="enmaGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#115E59"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#enmaGrad)"/>
  <!-- ENMA Logomark: Stylized "A" with upward arrow -->
  <g transform="translate(256, 256)">
    <!-- Letter A base -->
    <path d="M-75 85 L0 -75 L75 85" fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- A crossbar -->
    <line x1="-42" y1="30" x2="42" y2="30" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <!-- Upward arrow tip extending from A peak -->
    <path d="M-38 -42 L0 -96 L38 -42" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
