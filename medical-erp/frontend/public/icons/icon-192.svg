<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="enmaGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#115E59"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="32" fill="url(#enmaGrad)"/>
  <!-- ENMA Logomark: Stylized "A" with upward arrow -->
  <g transform="translate(96, 96)">
    <!-- Letter A base -->
    <path d="M-28 32 L0 -28 L28 32" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- A crossbar -->
    <line x1="-16" y1="12" x2="16" y2="12" stroke="white" stroke-width="7" stroke-linecap="round"/>
    <!-- Upward arrow tip extending from A peak -->
    <path d="M-14 -16 L0 -36 L14 -16" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
