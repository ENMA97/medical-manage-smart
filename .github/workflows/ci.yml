name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ──
  backend-tests:
    name: Backend Tests (Laravel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medical-erp/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, pdo_pgsql, zip, intl, mbstring, bcmath, redis
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: medical-erp/backend/vendor
          key: composer-${{ hashFiles('medical-erp/backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Copy environment
        run: cp .env.example .env 2>/dev/null || cp .env.testing .env 2>/dev/null || true

      - name: Generate key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test --parallel
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

  # ── Frontend Build ──
  frontend-build:
    name: Frontend Build (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medical-erp/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: medical-erp/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Run tests
        run: npm test -- --run
        continue-on-error: true

  # ── Docker Build Verification ──
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t medical-erp-backend ./medical-erp/backend

      - name: Build frontend image
        run: docker build -t medical-erp-frontend --target production ./medical-erp/frontend

  # ── Deploy (only on main) ──
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        run: |
          echo "🚀 Deployment triggered for main branch"
          echo "Configure this step with your deployment target:"
          echo "  - SSH to server and run docker compose pull && docker compose up -d"
          echo "  - Or push to container registry and update Kubernetes"
          echo "  - Or deploy to cloud provider (AWS ECS, GCP Cloud Run, etc.)"
